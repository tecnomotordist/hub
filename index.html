<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal TM Hub | Tecnomotor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: 'Pirulen';
            src: url('pirulen.ttf') format('truetype');
        }

        * { box-sizing: border-box; }
        :root {
            --tm-blue: #00687D; 
            --tm-red: #e30613;
            --bg: #f8fafb;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0; padding: 20px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            line-height: 1.5;
        }
        .container { width: 100%; max-width: 800px; }
        
        .header-brand { text-align: center; margin-bottom: 40px; }
        h1 { 
            font-family: 'Pirulen', sans-serif; 
            letter-spacing: 1.5px;
            font-size: 32px; color: var(--tm-blue); margin: 0; text-transform: uppercase; 
        }
        .by { display: block; font-size: 12px; color: var(--tm-blue); margin-top: 5px; opacity: 0.7; font-weight: bold; }
        
        .grid-menu {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 600px) {
            .grid-menu { grid-template-columns: 1fr; }
        }

        .menu-card {
            background: var(--card); 
            padding: 40px 30px; 
            border-radius: 12px;
            border: 2px solid transparent;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            border-color: var(--tm-blue);
            box-shadow: 0 10px 20px rgba(0, 104, 125, 0.15);
        }

        .menu-card:hover .btn-acessar {
            background: var(--tm-blue);
            color: #fff;
        }

        .icon-box {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .card-title {
            font-family: 'Pirulen', sans-serif; 
            font-size: 16px;
            color: var(--tm-blue);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .card-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 30px;
        }

        .btn-acessar {
            font-family: 'Pirulen', sans-serif;
            background: #f1f5f9;
            color: var(--tm-blue);
            padding: 10px 24px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            transition: 0.3s;
            width: 100%;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header-brand">
        <h1>PORTAL TECNOMOTOR</h1>
        <span class="by">Central de Ferramentas e Análises</span>
    </div>

    <div class="grid-menu">
        <a href="index2.html" class="menu-card">
            <div class="icon-box">⚙️</div>
            <div class="card-title">TM HUB: PROCESSAMENTO</div>
            <div class="card-desc">Processamento de planilhas de Vendas, Relatórios de Entrega Técnica e Mailing.</div>
            <div class="btn-acessar">ACESSAR SISTEMA</div>
        </a>

        <a href="index3.html" class="menu-card">
            <div class="icon-box">📊</div>
            <div class="card-title">DASHBOARD DE ATENDIMENTO</div>
            <div class="card-desc">Análise de métricas, TME, TMA e qualidade da equipe de atendimento via chat.</div>
            <div class="btn-acessar">VER MÉTRICAS</div>
        </a>
    </div>
</div>

</body>
</html>
